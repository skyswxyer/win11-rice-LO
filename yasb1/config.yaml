# yaml-language-server: $schema=https://raw.githubusercontent.com/amnweb/yasb/main/schema.json

watch_stylesheet: true
watch_config: true
debug: false
komorebi:
  start_command: 'komorebic start --config "C:\Users\Nyrn\.config\komorebi\komorebi.json" --whkd'
  stop_command: 'komorebic stop --whkd'
  reload_command: 'komorebic stop --whkd && komorebic start --config "C:\Users\Nyrn\.config\komorebi\komorebi.json" --whkd'
update_check: true
bars:
  primary-bar:
    enabled: true
    screens: ["*"]
    class_name: yasb-bar
    alignment:
      position: top
      center: true
    animation:
      enabled: true
      duration: 1000
    blur_effect:
      enabled: true
      acrylic: true
      round_corners: false
      round_corners_type: small
      border_color: "None"
    window_flags:
      always_on_top: false
      windows_app_bar: true
      hide_on_fullscreen: true
    dimensions:
      width: 100%
      height: 28
    padding:
      top: 0
      left: 0
      bottom: -1
      right: 0
    widgets:
      left: [
        "quick_launch",
        "komorebi_workspaces",
        "left-grouper",
        "taskbar",
      ]
      center: [
        "center-grouper"
      ]
      right: [
        "cava",
        "systeminfo-grouper",
        "volume",
        "systray",
        "wallpapers",
        "notifications",
        "power_menu"
      ]
widgets:
  left-grouper:
      type: "yasb.grouper.GrouperWidget"
      options:
        class_name: "left-grouper"
        widgets: [
          "komorebi_active_layout",
          "whkd",
        ]
  quick_launch:
    type: yasb.quick_launch.QuickLaunchWidget
    options:
      label: "<span>\ue8e5</span>"
      search_placeholder: Search applications...
      max_results: 50
      show_icons: true
      icon_size: 32
      home_page: false
      providers:
        apps:
          enabled: true
          prefix: '*'
          priority: 0
          show_recent: true
          max_recent: 5
          show_description: true
        color:
          enabled: true
          prefix: "c:"
          priority: 1
        file_search:
          enabled: true
          prefix: "/"
          priority: 2
          backend: "auto"
          show_path: true
      popup:
        width: 720
        height: 480
        blur: true
        round_corners: true
        round_corners_type: small
        border_color: "#484674"
        dark_mode: true
      callbacks:
        on_left: toggle_quick_launch
      keybindings:
      - keys: alt+space
        action: toggle_quick_launch
        screen: active
  taskbar:
    type: "yasb.taskbar.TaskbarWidget"
    options:
      icon_size: 16
      tooltip: true
      show_only_visible: false
      strict_filtering: true
      monitor_exclusive: false
      animation:
        enabled: true
        duration: 100
      preview:
        enabled: true
        width: 340
        delay: 400
        padding: 8
        margin: 8
      title_label:
        enabled: true
        show: "focused"
        min_length: 10
        max_length: 14
      ignore_apps:
        processes: []
        titles: []
        classes: []
  whkd:
    type: "yasb.whkd.WhkdWidget"
    options:
      label: "<span>\uf11c</span>"
      special_keys:
        - key: "win"
          key_replace: "\ue70f"
        - key: "ctrl"
          key_replace: "Ctrl"
        - key: "alt" 
          key_replace: "Alt"
        - key: "shift"
          key_replace: "Shift"
        - key: "left"
          key_replace: "\u2190"
        - key: "right"
          key_replace: "\u2192"
        - key: "up"
          key_replace: "\u2191"
        - key: "down"
          key_replace: "\u2193"
  komorebi_active_layout:
    type: "komorebi.active_layout.ActiveLayoutWidget"
    options:
      hide_if_offline: true
      label: "{layout_name}"
      layouts: ['bsp', 'columns', 'rows', 'grid', 'scrolling', 'vertical_stack', 'horizontal_stack', 'ultrawide_vertical_stack','right_main_vertical_stack']
      layout_icons:
        bsp: "\uebeb"
        columns: "\uebf7"
        rows: "\uec01"
        grid: "\udb81\udf58"
        scrolling: "\uebf7"
        vertical_stack: "\uebee"
        horizontal_stack: "\uebf0"
        ultrawide_vertical_stack: "\uebee"
        right_main_vertical_stack: "\uebf1"
        monocle: "\uf06f"
        maximized: "\uf06f"
        floating: "\uf2d2"
        paused: "\udb83\udf89"
        tiling: "\udb81\ude40"
      callbacks:
        on_left: 'toggle_layout_menu'
        on_middle: 'next_layout'
        on_right: 'prev_layout'
      layout_menu:
        blur: true
        round_corners: true
        round_corners_type: small
        border_color: "#484674"
        alignment: "left"
        direction: "down"
        offset_top: 10
        offset_left: 0
        show_layout_icons: true
      label_shadow:
        enabled: false
        color: "black"
        radius: 3
        offset: [ 1, 1 ]
  komorebi_workspaces:
    type: "komorebi.workspaces.WorkspaceWidget"
    options:
      label_offline: "\u23fc Offline"
      label_workspace_btn: "\u000d"
      label_workspace_active_btn: "\u000d"
      label_workspace_populated_btn: "\u000d"
      label_default_name: "{index}"
      label_zero_index: false
      hide_empty_workspaces: true
      hide_if_offline: true
      animation:
        enabled: true
        duration: 100
      toggle_workspace_layer:
        enabled: false
        tiling_label: "Tiling"
        floating_label: "Floating"
      app_icons: 
        enabled_populated: false
        enabled_active: false
        size: 12
        max_icons: 0
        hide_label: false
        hide_duplicates: false
        hide_floating: false
  center-grouper:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "center-grouper"
      widgets: [
        "clock",
        "open-meteo"
      ]
  clock:
      type: "yasb.clock.ClockWidget"
      options:
        label: "{%A, %b %d %H:%M}"
        label_alt: "{%A %d, %B %Y %H:%M}"
        update_interval: 1000
        calendar:
          blur: true
          round_corners: true
          round_corners_type: small
          border_color: "#484674"
          alignment: "center"
          direction: "down"
          offset_top: 10
          offset_left: 6
          show_holidays: true
          show_week_numbers: true
          country_code: "KZ"
          holiday_color: "#FF6464"
          extended: false
      callbacks:
        on_left: toggle_calendar
        on_middle: "next_timezone"
        on_right: toggle_label
  open-meteo:
    type: yasb.open_meteo.OpenMeteoWidget
    options:
      label: "<span>{icon}</span> {temp}"
      label_alt: '{location}: Min {min_temp}, Max {max_temp}, Humidity {humidity}'
      tooltip: true
      update_interval: 5000
      hide_decimal: true
      units: metric
      callbacks:
        on_left: toggle_card
        on_middle: do_nothing
        on_right: toggle_label
      icons:
        sunnyDay: "\ue30d"
        clearNight: "\ue32b"
        cloudyDay: "\ue312"
        cloudyNight: "\ue311"
        rainyDay: "\ue308"
        rainyNight: "\ue333"
        foggyDay: "\ue303"
        foggyNight: "\ue346"
        thunderstormDay: "\ue30f"
        thunderstormNight: "\ue338"
        default: "\uebaa"
      weather_card:
        blur: true
        alignment: center
        direction: down
        offset_top: 16
        offset_left: 0
        icon_size: 32
        show_hourly_forecast: true
        time_format: 24h
        hourly_point_spacing: 76
        hourly_icon_size: 16
        icon_smoothing: true
        temp_line_width: 2
        current_line_color: '#8EAEE8'
        current_line_width: 1
        current_line_style: dot
        hourly_forecast_buttons:
          enabled: true
        weather_animation:
          enabled: true
          snow_overrides_rain: true
          temp_line_animation_style: both
          rain_effect_intensity: 0.5
          snow_effect_intensity: 0.5
          scale_with_chance: true
  cava:
    type: "yasb.cava.CavaWidget"
    options:
      bar_height: 12
      min_bar_height: 1
      gradient: 0
      reverse: 1
      foreground: "#7d98f0"
      bars_number: 18
      bar_spacing: 0
      bar_width: 6
      noise_reduction: 50
      sleep_timer: 2
      hide_empty: false
  systray:
    type: yasb.systray.SystrayWidget
    options:
      class_name: systray
      label_collapsed: "\uf40e"
      label_expanded: "\uf40e"
      label_position: center
      icon_size: 16
      show_unpinned: false
      show_unpinned_button: true
      show_in_popup: true
      icons_per_row: 5
      popup:
        blur: true
        round_corners: true
        round_corners_type: small
        border_color: "#484674"
        alignment: "center"
        direction: "down"
        offset_top: 6
        offset_left: 0
  systeminfo-grouper:
    type: "yasb.grouper.GrouperWidget"
    options:
      class_name: "systeminfo-grouper"
      widgets: [
        "cpu",
        "gpu",
        "memory",
      ]
  cpu:
    type: yasb.cpu.CpuWidget
    options:
      label: "CPU"
      label_alt: "CPU: {info[percent][total]}%"
      update_interval: 2000
      hide_decimal: true
      progress_bar:
        enabled: true
        position: "left"
        size: 14
        thickness: 3
        color: "#7d98f0"
        background_color: "transparent" 
      menu:
        enabled: true
        show_graph: true
        show_graph_grid: true
        graph_history_size: 60
        alignment: center
      callbacks:
        on_left: toggle_menu
        on_right: toggle_label
  memory:
    type: yasb.memory.MemoryWidget
    options:
      label: "RAM"
      label_alt: "RAM: {virtual_mem_used}/{virtual_mem_total}"
      update_interval: 5000
      hide_decimal: true
      progress_bar:
        enabled: true
        position: "left"
        size: 14
        thickness: 3
        color: "#7d98f0"
        background_color: "transparent" 
      callbacks:
        on_left: toggle_menu
        on_middle: do_nothing
        on_right: toggle_label
      memory_thresholds:
        low: 25
        medium: 50
        high: 90
      histogram_icons:
      - "\u2581" # 0%
      - "\u2581" # 10%
      - "\u2582" # 20%
      - "\u2583" # 30%
      - "\u2584" # 40%
      - "\u2585" # 50%
      - "\u2586" # 60%
      - "\u2587" # 70%
      - "\u2588" # 80%+
      menu:
        enabled: true
        show_graph: true
        show_graph_grid: true
        graph_history_size: 60
  gpu:
    type: "yasb.gpu.GpuWidget"
    options:
      label: "GPU"
      label_alt: "GPU: {info[temp]}°C | {info[utilization]}%"
      update_interval: 2000
      progress_bar:
        enabled: true
        position: "left"
        size: 14
        thickness: 3
        color: "#7d98f0"
        background_color: "transparent" 
      gpu_thresholds:
        low: 25
        medium: 50
        high: 90
      histogram_icons:
        - "\u2581" # 0%
        - "\u2581" # 10%
        - "\u2582" # 20%
        - "\u2583" # 30%
        - "\u2584" # 40%
        - "\u2585" # 50%
        - "\u2586" # 60%
        - "\u2587" # 70%
        - "\u2588" # 80%+
      histogram_num_columns: 8
      callbacks:
        on_left: "toggle_menu"
        on_right: "toggle_label"
      menu:
        enabled: true
        show_graph: true
        show_graph_grid: true
        graph_history_size: 60
  volume:
    type: yasb.volume.VolumeWidget
    options:
      label: "<span>{icon}</span> {level}"
      label_alt: "{volume}"
      tooltip: true
      volume_icons:
      - "\ueee8"  # Icon for muted
      - "\uf026"  # Icon for 0-10% volume
      - "\uf027"  # Icon for 11-30% volume
      - "\uf027"  # Icon for 31-60% volume
      - "\uf028"  # Icon for 61-100% volume
      callbacks:
        on_left: toggle_volume_menu
        on_right: toggle_mute
      audio_menu:
        blur: true
        round_corners: true
        round_corners_type: small
        border_color: system
        alignment: right
        direction: down
        show_apps: true
        show_app_labels: false
        show_app_icons: true
        show_apps_expanded: false
        app_icons:
          toggle_down: "\uf078"
          toggle_up: "\uf077"
  wallpapers:
    type: "yasb.wallpapers.WallpapersWidget"
    options:
      label: "<span>\udb83\ude09</span>"
      image_path: "D:\\Images\\Art\\WP"
      change_automatically: false
      update_interval: 6000
      gallery:
        enabled: true
        blur: true
        image_width: 296
        image_per_page: 6
        show_buttons: true
        orientation: "portrait"
        image_spacing: 10
        lazy_load: true
        lazy_load_delay: 10
        lazy_load_fadein: 200
        image_corner_radius: 20
        enable_cache: true
  notifications:
    type: yasb.notifications.NotificationsWidget
    options:
      label: "<span>\udb80\udc9a</span>"
      label_alt: '{count} notifications'
      hide_empty: true
      tooltip: false
      callbacks:
        on_left: toggle_notification
        on_right: do_nothing
        on_middle: do_nothing
  power_menu:
    type: yasb.power_menu.PowerMenuWidget
    options:
      label: "<span>\u23fb</span>"
      uptime: true
      blur: false
      blur_background: true
      animation_duration: 250
      button_row: 5
      buttons:
        signout: ["\udb80\udf43","Sign out"]
        shutdown: ["\u23fb","Shut Down"]
        restart: ["\udb81\udf09","Restart"]
        sleep: ["\u23fe", "Sleep"]
        cancel: ["\uea76","Cancel"]